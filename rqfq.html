<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFQ Monitoring - NITTO SEIKO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    .stat-card { transition: all 0.2s ease; }
    .stat-card:hover { transform: translateY(-3px); }
  </style>
</head>
<body class="text-white p-5 min-h-screen">

  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-cyan-400 to-cyan-300 bg-clip-text text-transparent">📊 Monitoring RFQ</h1>
        <p class="text-slate-400 text-sm">Berdasarkan sheet REQ DRS SALES</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p id="clock" class="text-cyan-400 font-mono text-xl font-bold">--:--:--</p>
          <p id="today-date" class="text-slate-500 text-xs"></p>
        </div>
        <button onclick="refreshData()" class="bg-slate-800 hover:bg-slate-700 p-2 rounded-xl transition">
          <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Statistik Cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
      <div class="stat-card bg-slate-900/60 rounded-xl p-4 text-center border border-slate-700">
        <p class="text-slate-400 text-xs uppercase">Total RFQ</p>
        <p id="total-rfq" class="text-3xl font-bold text-cyan-400">0</p>
      </div>
      <div class="stat-card bg-slate-900/60 rounded-xl p-4 text-center border border-green-500/30">
        <p class="text-slate-400 text-xs uppercase">✅ Continue</p>
        <p id="total-continue" class="text-3xl font-bold text-green-400">0</p>
      </div>
      <div class="stat-card bg-slate-900/60 rounded-xl p-4 text-center border border-red-500/30">
        <p class="text-slate-400 text-xs uppercase">❌ Decline</p>
        <p id="total-decline" class="text-3xl font-bold text-red-400">0</p>
      </div>
      <div class="stat-card bg-slate-900/60 rounded-xl p-4 text-center border border-yellow-500/30">
        <p class="text-slate-400 text-xs uppercase">⚙️ Technical Assistance</p>
        <p id="total-ta" class="text-3xl font-bold text-yellow-400">0</p>
      </div>
      <div class="stat-card bg-slate-900/60 rounded-xl p-4 text-center border border-slate-500/30">
        <p class="text-slate-400 text-xs uppercase">📝 Lainnya / Kosong</p>
        <p id="total-other" class="text-3xl font-bold text-slate-400">0</p>
      </div>
    </div>

    <!-- Filter Bulan -->
    <div class="bg-slate-900/40 rounded-xl border border-slate-800 p-4 mb-6">
      <div class="flex flex-wrap items-center gap-4">
        <span class="text-slate-400 text-sm">📅 Filter bulan:</span>
        <select id="month-filter" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-cyan-500">
          <option value="all">Semua Bulan</option>
        </select>
        <button onclick="applyFilter()" class="bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400 px-3 py-1.5 rounded-lg text-sm transition">Tampilkan</button>
        <div class="text-xs text-slate-500 ml-auto">
          <span id="filter-info">Memuat data...</span>
        </div>
      </div>
    </div>

    <!-- Tabel Data RFQ -->
    <div class="bg-slate-900/40 rounded-xl border border-slate-800 overflow-hidden">
      <div class="px-5 py-3 border-b border-slate-800 flex justify-between items-center">
        <h3 class="font-semibold text-cyan-400">📋 Detail RFQ</h3>
        <div class="text-xs text-slate-500">
          <span id="row-count">0</span> data ditampilkan
        </div>
      </div>
      <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-800/50 sticky top-0">
            <tr class="text-left text-slate-300 text-xs font-medium">
              <th class="p-3">NO</th><th class="p-3">CUSTOMER</th><th class="p-3">PART NO</th>
              <th class="p-3">PIC</th><th class="p-3">QTY/MONTH</th><th class="p-3">TGL TERIMA</th>
              <th class="p-3">NITTO CODE</th><th class="p-3">JUDGEMENT</th>
             </tr>
          </thead>
          <tbody id="rfq-table-body" class="divide-y divide-slate-800">
            <tr><td colspan="8" class="text-center py-8 text-slate-500">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Konfigurasi
    const SHEET_ID = "1GEoZkSlk6xfqjn1mwe9ZgfKV9sOQAs1trHlLCCEtHr0";
    const SHEET_NAME = "REQ DRS SALES";
    const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;
    
    let allData = [];
    let currentFilter = "all";
    let availableMonths = new Set();
    
    // Parsing tanggal (format: 7-Jul-2025)
    function parseDateIndonesia(dateStr) {
      if (!dateStr || dateStr.trim() === "") return null;
      const months = {
        'jan':0,'feb':1,'mar':2,'apr':3,'may':4,'jun':5,
        'jul':6,'aug':7,'sep':8,'oct':9,'nov':10,'dec':11
      };
      let cleaned = dateStr.toString().trim().replace(/\s+/g, '-');
      let parts = cleaned.split('-');
      if (parts.length < 3) return null;
      let day = parseInt(parts[0], 10);
      let monthName = parts[1].substring(0,3).toLowerCase();
      let year = parseInt(parts[2], 10);
      if (isNaN(day) || isNaN(year) || months[monthName] === undefined) return null;
      return new Date(year, months[monthName], day);
    }
    
    // Ekstrak tahun-bulan
    function getYearMonth(dateStr) {
      const date = parseDateIndonesia(dateStr);
      if (!date) return null;
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
      return `${monthNames[month-1]} ${year}`;
    }
    
    // Kategori judgment
    function getJudgementCategory(judgement) {
      if (!judgement || judgement.toString().trim() === "") return "Lainnya";
      const j = judgement.toString().toUpperCase().trim();
      if (j === "CONTINUE") return "Continue";
      if (j === "DECLINE") return "Decline";
      if (j === "TECHNICAL ASSISTANCE") return "Technical Assistance";
      return "Lainnya";
    }
    
    function getBadgeClass(judgement) {
      if (!judgement) return 'bg-slate-700 text-slate-300';
      const j = judgement.toString().toUpperCase();
      if (j === 'CONTINUE') return 'bg-green-500/20 text-green-400 border border-green-500/30';
      if (j === 'DECLINE') return 'bg-red-500/20 text-red-400 border border-red-500/30';
      if (j === 'TECHNICAL ASSISTANCE') return 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
      return 'bg-slate-700 text-slate-300';
    }
    
    // Update dropdown bulan
    function updateMonthDropdown() {
      const select = document.getElementById('month-filter');
      const sortedMonths = Array.from(availableMonths).sort((a,b) => {
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
        const aYear = parseInt(a.split(' ')[1]);
        const bYear = parseInt(b.split(' ')[1]);
        const aMonth = months.indexOf(a.split(' ')[0]);
        const bMonth = months.indexOf(b.split(' ')[0]);
        if (aYear !== bYear) return bYear - aYear;
        return bMonth - aMonth;
      });
      
      select.innerHTML = '<option value="all">Semua Bulan</option>';
      sortedMonths.forEach(month => {
        select.innerHTML += `<option value="${month}">${month}</option>`;
      });
    }
    
    // Render dashboard
    function renderDashboard() {
      let filteredData = allData;
      
      if (currentFilter !== "all") {
        filteredData = allData.filter(row => {
          const yearMonth = getYearMonth(row["DATE TERIMA"]);
          return yearMonth === currentFilter;
        });
        document.getElementById('filter-info').innerHTML = `Menampilkan data ${currentFilter}`;
      } else {
        document.getElementById('filter-info').innerHTML = `Menampilkan semua data (${allData.length} total)`;
      }
      
      // Hitung statistik
      let stats = { total: filteredData.length, continue: 0, decline: 0, ta: 0, other: 0 };
      filteredData.forEach(row => {
        const cat = getJudgementCategory(row["JUDGEMENT"]);
        if (cat === "Continue") stats.continue++;
        else if (cat === "Decline") stats.decline++;
        else if (cat === "Technical Assistance") stats.ta++;
        else stats.other++;
      });
      
      document.getElementById('total-rfq').innerText = stats.total;
      document.getElementById('total-continue').innerText = stats.continue;
      document.getElementById('total-decline').innerText = stats.decline;
      document.getElementById('total-ta').innerText = stats.ta;
      document.getElementById('total-other').innerText = stats.other;
      document.getElementById('row-count').innerText = filteredData.length;
      
      const tbody = document.getElementById('rfq-table-body');
      if (filteredData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-slate-500">📭 Tidak ada data</td></tr>';
        return;
      }
      
      // Urutkan berdasarkan tanggal terbaru
      const sortedData = [...filteredData].sort((a, b) => {
        const dateA = parseDateIndonesia(a["DATE TERIMA"]);
        const dateB = parseDateIndonesia(b["DATE TERIMA"]);
        if (!dateA && !dateB) return 0;
        if (!dateA) return 1;
        if (!dateB) return -1;
        return dateB - dateA;
      });
      
      tbody.innerHTML = sortedData.map(row => `
        <tr class="hover:bg-slate-800/40 transition text-slate-300 text-xs">
          <td class="p-3">${row["NO"] || '-'}</td>
          <td class="p-3 font-medium">${row["CUSTOMER"] || '-'}</td>
          <td class="p-3">${row["PART NO"] || '-'}</td>
          <td class="p-3">${row["PIC PENERIMA DRAWING"] || '-'}</td>
          <td class="p-3 text-right">${row["QUANTITY/MONTH"] || '0'}</td>
          <td class="p-3">${row["DATE TERIMA"] || '-'}</td>
          <td class="p-3 font-mono text-cyan-300">${row["NITTO CODE"] || '-'}</td>
          <td class="p-3"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${getBadgeClass(row["JUDGEMENT"])}">${row["JUDGEMENT"] || '—'}</span></td>
        </tr>
      `).join('');
    }
    
    function applyFilter() {
      currentFilter = document.getElementById('month-filter').value;
      renderDashboard();
    }
    
    async function loadRFQData() {
      const tbody = document.getElementById('rfq-table-body');
      tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-slate-500">⏳ Mengambil data...</td></tr>';
      
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const rawData = await response.json();
        
        console.log("Data diterima:", rawData.length, "baris");
        
        if (!Array.isArray(rawData) || rawData.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-yellow-400">⚠️ Data kosong</td></tr>';
          return;
        }
        
        allData = rawData;
        
        // Kumpulkan bulan-bulan yang tersedia
        availableMonths.clear();
        allData.forEach(row => {
          const yearMonth = getYearMonth(row["DATE TERIMA"]);
          if (yearMonth) availableMonths.add(yearMonth);
        });
        
        updateMonthDropdown();
        renderDashboard();
        
      } catch (err) {
        console.error("Error:", err);
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-8 text-red-400">❌ Error: ${err.message}</td></tr>`;
      }
    }
    
    function refreshData() { loadRFQData(); }
    
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
      document.getElementById('today-date').innerHTML = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }
    
    // Jalankan
    loadRFQData();
    setInterval(loadRFQData, 30000);
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
