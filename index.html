<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC System - NITTO SEIKO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .loading-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(34, 211, 238, 0.3);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Redirect to login.html after a short delay
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 1500);
    </script>
</head>
<body>
    <div class="loading-card">
        <div class="spinner"></div>
        <h1 style="color: #22d3ee; margin-bottom: 10px;">NITTO SEIKO</h1>
        <p style="color: #94a3b8; font-size: 14px;">Quality Control System</p>
        <p style="color: #64748b; font-size: 12px; margin-top: 15px;">Redirecting to login page...</p>
    </div>
</body>
</html>
