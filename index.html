<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, user-scalable=no">
    <title>QC Dashboard - One Page Fit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            overflow: hidden;
        }
        
        /* Custom scrollbar - minimal */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #22d3ee;
            border-radius: 10px;
        }
        
        /* Smooth transitions */
        .calendar-card, .today-event-card, .stat-card {
            transition: all 0.2s ease;
        }
        
        .calendar-card:hover, .today-event-card:hover, .stat-card:hover {
            transform: translateY(-1px);
        }
        
        .today-event-card {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.08), rgba(6, 182, 212, 0.03));
            border-left: 2px solid #22d3ee;
        }
        
        .empty-today {
            background: rgba(15, 23, 42, 0.3);
        }
        
        /* Calendar cell */
        .calendar-cell {
            transition: all 0.15s ease;
        }
        
        .calendar-cell:hover {
            transform: translateY(-1px);
            border-color: #22d3ee !important;
        }
        
        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">

    <div class="h-screen flex flex-col p-3 gap-2 overflow-hidden">

        <!-- HEADER - Compact -->
        <div class="flex justify-between items-center bg-slate-900/50 backdrop-blur-sm rounded-xl px-4 py-2 border border-slate-800 shrink-0">
            <div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-cyan-300 bg-clip-text text-transparent">PT NITTO ALAM INDONESIA PLANT 2</h1>
                <p class="text-slate-500 text-[10px]">Menjadi perusahaan NO.1 di NITTO SEIKO GROUB</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <p id="clock" class="text-cyan-400 font-bold text-sm">--:--:--</p>
                    <p id="date-header" class="text-slate-500 text-[9px]">Loading...</p>
                </div>
                <div class="flex items-center gap-1 bg-green-500/10 px-2 py-1 rounded-lg">
                    <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-green-400 text-[8px] font-bold">LIVE</span>
                </div>
            </div>
        </div>

        <!-- LOADING - Minimal -->
        <div id="loading" class="text-slate-400 text-xs flex items-center gap-2 shrink-0">
            <div class="w-3 h-3 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
            <span>Loading data...</span>
        </div>

        <!-- MAIN GRID - One Page Fit -->
        <div class="flex-1 grid grid-cols-12 gap-2 min-h-0">

            <!-- CALENDAR - 8 columns, fits perfectly -->
            <div class="col-span-8 bg-slate-900/50 rounded-xl border border-slate-800 p-2 flex flex-col overflow-hidden">
                <!-- Calendar Header -->
                <div class="flex justify-between items-center mb-1 shrink-0 px-1">
                    <div class="flex items-center gap-1">
                        <span class="text-sm">📅</span>
                        <h2 id="calendar-month" class="text-cyan-400 font-bold text-xs">Loading...</h2>
                    </div>
                    <div class="text-slate-500 text-[8px] flex items-center gap-1">
                        <div class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></div>
                        <span>Live</span>
                    </div>
                </div>
                
                <!-- Days Header - Compact -->
                <div class="grid grid-cols-7 gap-0.5 mb-1 text-center text-[8px] font-bold">
                    <div class="text-red-400 py-0.5">Sun</div>
                    <div class="text-slate-500 py-0.5">Mon</div>
                    <div class="text-slate-500 py-0.5">Tue</div>
                    <div class="text-slate-500 py-0.5">Wed</div>
                    <div class="text-slate-500 py-0.5">Thu</div>
                    <div class="text-slate-500 py-0.5">Fri</div>
                    <div class="text-cyan-400 py-0.5">Sat</div>
                </div>
                
                <!-- Calendar Grid - Compact cells -->
                <div id="calendar-grid" class="grid grid-cols-7 gap-0.5 flex-1 overflow-y-auto min-h-0">
                    <!-- Calendar akan diisi JS -->
                </div>
            </div>

            <!-- RIGHT PANEL - 4 columns -->
            <div class="col-span-4 flex flex-col gap-2 min-h-0">

                <!-- TODAY'S EVENTS - Compact -->
                <div class="bg-slate-900/50 rounded-xl border border-slate-800 p-2 flex-1 flex flex-col overflow-hidden">
                    <div class="flex items-center gap-1 mb-1 shrink-0">
                        <span class="text-xs">📅</span>
                        <h3 class="font-bold text-cyan-400 text-xs">Today's Events</h3>
                        <span id="today-date" class="text-slate-500 text-[8px] ml-auto"></span>
                    </div>
                    <div id="today-events-list" class="text-xs space-y-1 overflow-y-auto flex-1 pr-1">
                        <div class="text-slate-500 text-[10px] text-center py-2">Loading...</div>
                    </div>
                </div>

                <!-- AUDIT SUMMARY - Compact -->
                <div class="bg-slate-900/50 rounded-xl border border-slate-800 p-2 shrink-0">
                    <div class="flex items-center gap-1 mb-1">
                        <span class="text-xs">🔍</span>
                        <h3 class="font-bold text-cyan-400 text-xs">Audit Summary</h3>
                    </div>
                    <div id="audit-list" class="text-[9px]">
                        Loading...
                    </div>
                </div>

                <!-- KPI QUICK - Minimal -->
                <div class="bg-slate-900/50 rounded-xl border border-slate-800 p-2 shrink-0">
                    <div class="flex items-center gap-1 mb-1">
                        <span class="text-xs">📊</span>
                        <h3 class="font-bold text-cyan-400 text-xs">KPI</h3>
                    </div>
                    <div class="grid grid-cols-3 gap-1 text-center">
                        <div class="bg-yellow-500/5 rounded p-1">
                            <div id="open-finding" class="text-yellow-400 font-bold text-sm">0</div>
                            <div class="text-slate-500 text-[7px]">OPEN</div>
                        </div>
                        <div class="bg-green-500/5 rounded p-1">
                            <div class="text-green-400 font-bold text-sm">98%</div>
                            <div class="text-slate-500 text-[7px]">QUALITY</div>
                        </div>
                        <div class="bg-cyan-500/5 rounded p-1">
                            <div class="avg-production text-cyan-400 font-bold text-sm">--</div>
                            <div class="text-slate-500 text-[7px]">PROD</div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        // Clock function
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            const date = now.toLocaleDateString('id-ID', { 
                weekday: 'short', 
                day: 'numeric', 
                month: 'short' 
            });
            const clockElem = document.getElementById('clock');
            const dateHeaderElem = document.getElementById('date-header');
            if (clockElem) clockElem.innerText = time;
            if (dateHeaderElem) dateHeaderElem.innerText = date;
        }
        
        // Get today's date in YYYY-MM-DD
        function getTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // Format display date
        function formatDisplayDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('id-ID', { 
                weekday: 'short', 
                day: 'numeric', 
                month: 'short' 
            });
        }
        
        async function loadData() {
            const loadingDiv = document.getElementById('loading');
            const calendarGrid = document.getElementById('calendar-grid');
            const calendarMonthSpan = document.getElementById('calendar-month');
            const todayEventsListDiv = document.getElementById('today-events-list');
            const todayDateSpan = document.getElementById('today-date');
            const auditListDiv = document.getElementById('audit-list');
            const openFindingSpan = document.getElementById('open-finding');
            
            loadingDiv.innerHTML = '<div class="w-3 h-3 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div><span> Loading...</span>';
            
            try {
                // Fetch data
                const [eventResponse, auditResponse, prodResponse] = await Promise.all([
                    fetch('https://opensheet.elk.sh/1xOsZd0i8KPGzr_e3X24QY3m-hKi7Ip3RFDtbsr__ph0/event'),
                    fetch('https://opensheet.elk.sh/1xOsZd0i8KPGzr_e3X24QY3m-hKi7Ip3RFDtbsr__ph0/audit'),
                    fetch('https://opensheet.elk.sh/1xOsZd0i8KPGzr_e3X24QY3m-hKi7Ip3RFDtbsr__ph0/production')
                ]);
                
                const events = await eventResponse.json();
                const audits = await auditResponse.json();
                const productions = await prodResponse.json();
                
                // Update production average
                if (productions && productions.length > 0) {
                    const values = productions.map(p => Number(p.output) || 0);
                    const avg = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(0);
                    const avgElem = document.querySelector('.avg-production');
                    if (avgElem) avgElem.innerText = avg;
                }
                
                // Today's events
                const todayDate = getTodayDate();
                const todayEvents = events.filter(event => event.date === todayDate);
                todayDateSpan.innerHTML = formatDisplayDate(todayDate);
                
                if (todayEvents.length > 0) {
                    todayEventsListDiv.innerHTML = todayEvents.map(event => {
                        let icon = '📌';
                        if (event.type === 'audit') icon = '🔍';
                        else if (event.type === 'visit') icon = '👥';
                        else if (event.type === 'training') icon = '📚';
                        
                        return `
                            <div class="today-event-card rounded-lg p-1.5 mb-1">
                                <div class="flex items-start gap-2">
                                    <div class="text-sm">${icon}</div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center justify-between">
                                            <span class="font-bold text-white text-[10px] truncate">${event.title}</span>
                                            <span class="text-[7px] text-slate-500">Today</span>
                                        </div>
                                        <p class="text-slate-400 text-[8px]">${event.type}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    todayEventsListDiv.innerHTML = `
                        <div class="empty-today rounded-lg p-2 text-center">
                            <div class="text-lg">📭</div>
                            <p class="text-slate-500 text-[9px]">No events today</p>
                        </div>
                    `;
                }
                
                // Audit summary
                const openAudits = audits.filter(a => a.status === 'OPEN');
                const closedAudits = audits.filter(a => a.status === 'CLOSE');
                const inProgressAudits = audits.filter(a => a.status === 'IN PROGRESS');
                
                openFindingSpan.innerText = openAudits.length;
                
                auditListDiv.innerHTML = `
                    <div class="grid grid-cols-3 gap-1 mb-1">
                        <div class="bg-red-500/10 rounded p-1 text-center">
                            <div class="text-red-400 font-bold text-xs">${openAudits.length}</div>
                            <div class="text-slate-500 text-[7px]">OPEN</div>
                        </div>
                        <div class="bg-yellow-500/10 rounded p-1 text-center">
                            <div class="text-yellow-400 font-bold text-xs">${inProgressAudits.length}</div>
                            <div class="text-slate-500 text-[7px]">PROG</div>
                        </div>
                        <div class="bg-green-500/10 rounded p-1 text-center">
                            <div class="text-green-400 font-bold text-xs">${closedAudits.length}</div>
                            <div class="text-slate-500 text-[7px]">CLOSED</div>
                        </div>
                    </div>
                    <div class="max-h-12 overflow-y-auto text-[8px]">
                        ${openAudits.slice(0, 2).map(a => `
                            <div class="text-red-400 py-0.5 truncate">⚠ ${a.finding?.substring(0, 25)}</div>
                        `).join('')}
                        ${openAudits.length === 0 ? '<div class="text-green-400 text-center text-[8px]">✅ All clear</div>' : 
                          openAudits.length > 2 ? '<div class="text-slate-500 text-center text-[7px]">+ more</div>' : ''}
                    </div>
                `;
                
                // Build calendar
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const today = now.getDate();
                const monthName = now.toLocaleString('default', { month: 'short' });
                
                calendarMonthSpan.innerText = `${monthName} ${year}`;
                
                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                
                let html = '';
                
                // Empty cells
                for (let i = 0; i < firstDay; i++) {
                    html += `<div class="bg-slate-800/20 rounded p-1 min-h-[55px] border border-slate-700/20"></div>`;
                }
                
                // Date cells
                for (let day = 1; day <= lastDate; day++) {
                    const fullDate = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                    const event = events.find(e => e.date === fullDate);
                    const isToday = day === today;
                    
                    let eventHtml = '';
                    if (event) {
                        let icon = '📌';
                        if (event.type === 'audit') icon = '🔍';
                        else if (event.type === 'visit') icon = '👥';
                        else if (event.type === 'training') icon = '📚';
                        eventHtml = `<div class="text-[7px] mt-0.5 text-cyan-400 truncate">${icon} ${event.title}</div>`;
                    }
                    
                    html += `
                        <div class="calendar-cell rounded p-1 min-h-[55px] border ${isToday ? 'bg-cyan-500/10 border-cyan-500' : 'bg-slate-800/30 border-slate-700/30'}">
                            <span class="text-[10px] font-bold ${isToday ? 'text-cyan-400' : 'text-white'}">${day}</span>
                            ${eventHtml}
                        </div>
                    `;
                }
                
                calendarGrid.innerHTML = html;
                loadingDiv.innerHTML = '<span class="text-green-400">✅</span><span class="text-[10px]"> Data loaded</span>';
                setTimeout(() => {
                    if (loadingDiv.innerHTML.includes('Data loaded')) {
                        loadingDiv.innerHTML = '';
                    }
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = '<span class="text-red-400">❌</span><span class="text-[10px]"> Error: ' + error.message + '</span>';
            }
        }
        
        // Initialize
        updateClock();
        loadData();
        
        // Auto refresh every 30 seconds
        setInterval(loadData, 30000);
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
