<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QC System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            transition: all 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            border-color: rgba(34, 211, 238, 0.5);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
            outline: none;
        }
        
        .login-btn {
            transition: all 0.3s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 211, 238, 0.3);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease;
        }
        
        .error-message {
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="w-full max-w-md p-6 animate-fade-in">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-cyan-500 to-cyan-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <span class="text-white text-3xl font-bold">QC</span>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-cyan-300 bg-clip-text text-transparent">NITTO SEIKO</h1>
            <p class="text-slate-500 text-sm mt-2">Quality Control Management System</p>
        </div>
        
        <!-- Login Card -->
        <div class="login-card rounded-2xl p-8">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Welcome Back</h2>
            
            <form onsubmit="handleLogin(event); return false;">
                <div class="mb-5">
                    <label class="block text-slate-400 text-sm mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500">👤</span>
                        <input type="text" id="username" 
                               class="input-field w-full bg-slate-800/50 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-white focus:border-cyan-500"
                               placeholder="Enter your username" required>
                    </div>
                </div>
                
                <div class="mb-6">
                    <label class="block text-slate-400 text-sm mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500">🔒</span>
                        <input type="password" id="password" 
                               class="input-field w-full bg-slate-800/50 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-white focus:border-cyan-500"
                               placeholder="Enter your password" required>
                    </div>
                </div>
                
                <button type="submit" id="login-btn" class="login-btn w-full bg-gradient-to-r from-cyan-500 to-cyan-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
                    <span>Sign In</span>
                </button>
            </form>
            
            <div id="error-message" class="mt-4 text-center text-red-400 text-sm hidden">
                Invalid username or password
            </div>
            
            <div class="mt-6 pt-4 border-t border-slate-800 text-center">
                <p class="text-slate-500 text-xs">NITTO SEIKO Quality System</p>
                <div id="account-status" class="text-cyan-400 text-xs mt-1">⏳ Connecting to database...</div>
            </div>
        </div>
        
        <div class="text-center mt-6">
            <p class="text-slate-600 text-xs">© 2024 NITTO SEIKO - Quality Control System</p>
        </div>
    </div>

    <script>
        // API Endpoint untuk data akun (sheet "akun")
        const ACCOUNT_API = "https://opensheet.elk.sh/1xOsZd0i8KPGzr_e3X24QY3m-hKi7Ip3RFDtbsr__ph0/akun";
        
        let usersData = [];
        let isLoading = true;
        
        // Load data akun dari spreadsheet
        async function loadUsersFromSheet() {
            const statusDiv = document.getElementById('account-status');
            
            try {
                statusDiv.innerHTML = "🔄 Connecting to database...";
                const response = await fetch(ACCOUNT_API);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Raw data from sheet:', data);
                
                if (data && Array.isArray(data) && data.length > 0) {
                    usersData = data.map(row => ({
                        id: row.id || '',
                        username: (row.username || '').toLowerCase(),
                        password: row.paswword || row.password || '',
                        role: (row.status || '').toLowerCase()
                    }));
                    
                    statusDiv.innerHTML = `✅ ${usersData.length} accounts loaded`;
                    console.log('Processed users:', usersData);
                    isLoading = false;
                } else {
                    statusDiv.innerHTML = "⚠️ No accounts found in database";
                    console.log('No data from API');
                }
                
            } catch (error) {
                console.error('Error loading users:', error);
                statusDiv.innerHTML = "❌ Failed to load accounts. Using fallback data.";
                
                usersData = [
                    { id: "1", username: "habib", password: "123", role: "admin" },
                    { id: "2", username: "windah", password: "123", role: "user" },
                    { id: "3", username: "ryuma", password: "123", role: "user" },
                    { id: "4", username: "prabowo", password: "123", role: "user" }
                ];
                isLoading = false;
            }
        }
        
        // Check if already logged in - redirect to maindashboard.html
        function checkAlreadyLoggedIn() {
            const user = sessionStorage.getItem('currentUser');
            if (user) {
                window.location.href = 'maindashboard.html';
                return true;
            }
            return false;
        }
        
        // Handle login form submission
        async function handleLogin(event) {
            event.preventDefault();
            
            if (isLoading) {
                showError("Please wait, loading accounts...");
                return;
            }
            
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const originalBtnText = loginBtn.innerHTML;
            
            loginBtn.innerHTML = '<span class="loading-spinner"></span><span> Signing in...</span>';
            loginBtn.disabled = true;
            
            const user = usersData.find(u => 
                u.username === username && u.password === password
            );
            
            loginBtn.innerHTML = originalBtnText;
            loginBtn.disabled = false;
            
            if (user) {
                sessionStorage.setItem('currentUser', JSON.stringify({
                    id: user.id,
                    username: user.username,
                    role: user.role
                }));
                
                console.log('Login successful:', user.username, 'Role:', user.role);
                
                // Redirect ke maindashboard.html
                window.location.href = 'maindashboard.html';
            } else {
                showError("Invalid username or password");
                document.getElementById('password').value = '';
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.innerHTML = message;
            errorDiv.classList.remove('hidden');
            errorDiv.classList.add('error-message');
            setTimeout(() => {
                errorDiv.classList.remove('error-message');
            }, 300);
        }
        
        async function init() {
            if (checkAlreadyLoggedIn()) return;
            await loadUsersFromSheet();
        }
        
        init();
    </script>
</body>
</html>
